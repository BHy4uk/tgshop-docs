site_name: Telegram-магазин
site_description: Документація платформи
site_url: https://bhy4uk.github.io/tgshop-docs/

theme:
  name: material
  language: uk
  logo: assets/logo.svg
  favicon: assets/favicon.ico
  features:
    - navigation.sections
    - navigation.prune
    - navigation.top
    - header.autohide
    - navigation.instant
    - navigation.tracking
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.share
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/weather-night
        name: Темна тема
    - scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Світла тема
  font:
    text: Manrope
    code: JetBrains Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  generator: false   # прибирає "Made with Material"

extra_css:
  - styles/extra.css

exclude_docs: |
  ARCHITECTURE_SCALING.md
  PLATFORM_CONTEXT.md
  PRICING_NARRATIVE.md
  README_SELF_HOSTED.md
  TEST_GUIDE.md
  VPS_DEPLOYMENT_UBUNTU.md

nav:
  - Початок: index.md
  - Для власника магазину:
    - Інструкція для власника: owner-guide.md
    - Запуск магазину: launch.md
    - Оплати: payments.md
    - Нова пошта: nova-poshta.md
